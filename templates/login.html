{% extends 'base.html' %}
{% block content %}
<div style="max-width: 420px; margin: 10vh auto;">
    <div class="card" style="text-align: center;">
        <div
            style="width: 60px; height: 60px; background: var(--primary); border-radius: 16px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);">
            🔒
        </div>
        <h1 class="title">Acesso Restrito</h1>
        <p class="subtitle">Insira suas credenciais para continuar</p>

        {% if error %}
        <div
            style="background: rgba(225, 29, 72, 0.1); color: var(--danger); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid rgba(225, 29, 72, 0.2);">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" style="text-align: left;">
            <label>E-mail</label>
            <input type="email" name="email" placeholder="ex: admin@casadeapostas.com" required>

            <label>Senha</label>
            <input type="password" name="password" placeholder="••••••••" required>

            <button type="submit" class="btn" style="width: 100%; padding: 1rem;">Autenticar</button>
        </form>
    </div>
</div>
{% endblock %}
